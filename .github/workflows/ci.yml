name: CI

# Запускается при PR в dev/main и при пуше в dev
on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: repair
          POSTGRES_PASSWORD: repair
          POSTGRES_DB: repair_estimator
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Пока backend не создан — job просто аккуратно завершается.
      # Когда папка backend появится, проверки начнут работать автоматически.
      - name: Check backend exists
        id: check
        run: |
          if [ -f backend/requirements.txt ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "backend/requirements.txt не найден — пропускаем проверку backend"
          fi

      - name: Set up Python
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: ruff check .

      - name: Tests (pytest)
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://repair:repair@localhost:5432/repair_estimator
        run: |
          set +e
          pytest
          code=$?
          set -e
          if [ "$code" -eq 5 ]; then
            echo "No tests collected yet — это нормально, пока тесты не написаны"
            exit 0
          fi
          exit "$code"

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check frontend exists
        id: check
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "frontend/package.json не найден — пропускаем проверку frontend"
          fi

      - name: Set up Node
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Lint
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run build
