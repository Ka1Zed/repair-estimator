[pytest]
testpaths = app/tests
# Обычный прогон герметичен: реальные сетевые смоук-проверки парсеров (маркер live)
# исключены по умолчанию. Запуск смоука вручную: pytest -m live (#174).
addopts = -m "not live"
markers =
    live: реальные сетевые смоук-проверки парсеров (нужен интернет; вне обычного прогона)
