services:
  postgres:
    image: postgres:16
    container_name: repair-estimator-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: repair-estimator-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # В контейнере БД доступна по имени сервиса, а не localhost.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # CORS: на сервере выставить адрес сайта (см. .env.example).
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      # Ключи beta-распознавания чертежа (опциональны).
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Адрес backend зашивается в бандл при сборке.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: repair-estimator-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
