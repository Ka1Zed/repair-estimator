services:
  postgres:
    image: postgres:16
    container_name: repair-estimator-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: repair-estimator-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # В контейнере БД доступна по имени сервиса, а не localhost.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # CORS: на сервере выставить адрес сайта (см. .env.example).
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      # Ключи beta-распознавания чертежа (опциональны).
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Адрес backend зашивается в бандл при сборке.
        # С Caddy+HTTPS задать в .env same-origin https-адрес, напр.
        # https://<ip>.sslip.io — тогда фронт ходит на /api того же домена.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: repair-estimator-frontend
    restart: unless-stopped
    depends_on:
      - backend
    # Порты наружу не публикуем — трафик идёт через caddy (80/443).
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: repair-estimator-caddy
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      # Публичный домен для автоматического TLS (см. .env и Caddyfile).
      PUBLIC_HOST: ${PUBLIC_HOST:-:80}
      # Голый IP сервера — только для редиректа http://<IP> на PUBLIC_HOST
      # (см. Caddyfile). Не влияет на TLS.
      PUBLIC_IP: ${PUBLIC_IP:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
