server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Загрузка чертежа отправляет файл целиком — поднимаем лимит тела запроса.
    client_max_body_size 20m;

    # SPA: неизвестный путь отдаём index.html (клиентский роутинг React).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Прокси API на backend-контейнер. Нужен для beta-загрузки чертежа,
    # которая ходит на относительный /api/... с того же origin.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
